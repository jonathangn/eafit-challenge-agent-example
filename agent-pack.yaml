# Personal AIssistant — Agent Pack (local development)
#
# This file is mounted into the chatbot container by docker-compose.
# For K8s deployment, the agent pack is embedded in deployment.yaml.
metadata:
  id: personal-aissistant
  displayName: Personal AIssistant
  description: >-
    A friendly Personal AIssistant ready to help you with common management tasks and questions. Built for the EAFIT Challenge with the Verana ecosystem.
  defaultLanguage: es
  tags:
    - github
    - mcp
    - eafit
    - persona
    - assistant
    - friendly

languages:
  en:
    greetingMessage: >-
      👋 Hello! I'm your Personal AIssistant, powered by the Verana ecosystem. I'm here to help you with common management tasks and questions. How can I assist you today?
    systemPrompt: >-
      You are a helpful, friendly personal AI assistant focused on management tasks and questions. Your goal is to help users with their common management tasks and questions in a clear, concise, and professional manner. Be warm and approachable. If you don't know something, say so clearly. Do not reveal you are an AI unless directly asked, your scope is limited to management tasks and related questions to that.
    strings:
      ROOT_TITLE: 'Personal AIssistant'
      LOGOUT: 'Logout'
      CREDENTIAL: 'Authenticate'
      WELCOME: 'Welcome! I am your Personal AIssistant, ready to help you.'
      AUTH_REQUIRED: 'Authentication is required to access this feature.'
      AUTH_SUCCESS: 'Authentication completed successfully. You can now access all features.'
      AUTH_SUCCESS_NAME: 'Authentication successful. Welcome, {name}! You can now access all features.'
      WAITING_CREDENTIAL: 'Waiting for you to complete the credential process...'
      AUTH_PROCESS_STARTED: 'Authentication process has started. Please respond to the credential request.'
      STATS_ERROR: 'Sorry, we could not retrieve your statistics at the moment.'
      ERROR_MESSAGES: 'The service is not available at the moment. Please try again later.'
      LOGOUT_CONFIRMATION: 'You have been logged out successfully.'
      MCP_CONFIG_MENU: 'MCP Server Config'
      MCP_CONFIG_ABORT: 'Abort Configuration'
      MCP_CONFIG_SELECT_SERVER: 'Select the MCP server you want to configure:'
      MCP_CONFIG_SAVED: '✅ Configuration for "{server}" saved and verified successfully.'
      MCP_CONFIG_INVALID: '⚠️ Connection test failed for "{server}". The credentials may be invalid. Please try configuring again.'
      MCP_CONFIG_ERROR: 'An error occurred while saving configuration. Please try again.'
      MCP_CONFIG_ABORTED: 'Configuration cancelled.'
  es:
    greetingMessage: >-
      👋 ¡Hola! Soy tu IAsistente Personal, impulsado por el ecosistema Verana. Estoy aquí para ayudarte con preguntas, tareas y brindarte información útil. ¿En qué puedo ayudarte hoy?
    systemPrompt: >-
      Eres un asistente de IA útil y amigable. Tu objetivo es ayudar a los usuarios con sus preguntas y tareas de manera clara, concisa y profesional. Sé cálido y cercano. Si no sabes algo, dilo claramente. No reveles que eres una IA a menos que te pregunten directamente, tu scope es limitado a tareas y preguntas relacionadas con la gestión.
    strings:
      ROOT_TITLE: 'IAsistente Personal'
      LOGOUT: 'Cerrar sesión'
      CREDENTIAL: 'Autenticar'
      WELCOME: '¡Bienvenido! Soy tu IAsistente Personal, listo para ayudarte.'
      AUTH_REQUIRED: 'Se requiere autenticación para acceder a esta función.'
      AUTH_SUCCESS: 'Autenticación completada con éxito. Ahora puedes acceder a todas las funciones.'
      AUTH_SUCCESS_NAME: 'Autenticación completada con éxito. ¡Bienvenido, {name}! Ahora puedes acceder a todas las funciones.'
      WAITING_CREDENTIAL: 'Esperando que completes el proceso de credencial...'
      AUTH_PROCESS_STARTED: 'El proceso de autenticación ha comenzado. Por favor, responde a la solicitud de credencial.'
      STATS_ERROR: 'Lo sentimos, no pudimos obtener tus estadísticas en este momento.'
      ERROR_MESSAGES: 'El servicio no está disponible en este momento. Por favor, intenta de nuevo más tarde.'
      LOGOUT_CONFIRMATION: 'Has cerrado sesión exitosamente.'
      MCP_CONFIG_MENU: 'Configurar Servidor MCP'
      MCP_CONFIG_ABORT: 'Cancelar Configuración'
      MCP_CONFIG_SELECT_SERVER: 'Selecciona el servidor MCP que deseas configurar:'
      MCP_CONFIG_SAVED: '✅ Configuración de "{server}" guardada y verificada correctamente.'
      MCP_CONFIG_INVALID: '⚠️ La prueba de conexión falló para "{server}". Las credenciales pueden ser inválidas. Por favor, intenta configurar de nuevo.'
      MCP_CONFIG_ERROR: 'Ocurrió un error al guardar la configuración. Por favor, inténtalo de nuevo.'
      MCP_CONFIG_ABORTED: 'Configuración cancelada.'

llm:
  provider: openai
  model: google/gemma-3-4b-it:free
  baseUrl: https://openrouter.ai/api/v1
  temperature: 0.2
  agentPrompt: >-
    You are a helpful assistant.
      
      ### Agent Tools & Capabilities
      ALWAYS use your available tools to fulfill requests when relevant:
      - **Time**: You have access to the current time and timezone conversions. Use it when discussing schedules or 'today'.
      - **Weather**: If the user asks about the weather, temperature, or conditions, ALWAYS use the weather tool. Do not guess.
      - **Wikipedia**: Use this tool to look up facts, history, or general knowledge.
      - **Web Search**: If the user asks about current events, news, or requires real-time internet data, ALWAYS use the duckduckgo search tool.  

rag:
  provider: langchain
  docsPath: /app/rag/docs
  remoteUrls:
    - https://raw.githubusercontent.com/verana-labs/eafit-challenge-agent-example/main/docs/README.md
  vectorStore:
    type: redis
    indexName: personal-aissistant

memory:
  backend: redis
  window: 20
  redisUrl: redis://redis:6379

flows:
  welcome:
    enabled: true
    sendOnProfile: true
    templateKey: greetingMessage
  authentication:
    enabled: true
    credentialDefinitionId: ${CREDENTIAL_DEFINITION_ID}
    adminAvatars: []
  menu:
    items:
      - id: authenticate
        labelKey: CREDENTIAL
        action: authenticate
        visibleWhen: unauthenticated
      - id: logout
        labelKey: LOGOUT
        action: logout
        visibleWhen: authenticated
      - id: mcp-config
        labelKey: MCP_CONFIG_MENU
        action: mcp-config
        visibleWhen: notConfiguring
      - id: abort-config
        labelKey: MCP_CONFIG_ABORT
        action: abort-config
        visibleWhen: configuring

mcp:
  servers:
    - name: weather
      transport: stdio
      command: npx
      args: ["-y", "@smithery/weather-mcp"]
      toolAccess:
        default: public
    - name: wikipedia
      transport: stdio
      command: npx
      args: ["-y", "@smithery/wikipedia"]
      toolAccess:
        default: public
    - name: time
      transport: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-time"]
      toolAccess:
        default: public
    - name: duckduckgo
      transport: stdio
      command: npx
      args: ["-y", "@ericthered926/duckduckgo-mcp-server"]
      toolAccess:
        default: public
    - name: github
      transport: streamable-http
      url: https://api.githubcopilot.com/mcp/
      headers:
        Authorization: "Bearer ${GITHUB_PERSONAL_ACCESS_TOKEN}"
      accessMode: user-controlled
      userConfig:
        fields:
          - name: token
            type: secret
            label:
              en: "Please enter your GitHub Personal Access Token:"
              es: "Por favor, ingresa tu Token de Acceso Personal de GitHub:"
            headerTemplate: "Bearer {value}"
      toolAccess:
        default: public

integrations:
  vsAgent:
    adminUrl: http://vs-agent:3000
  postgres:
    host: postgres
    user: personal_aiassistant_db
    password: changeme
    dbName: personal-aissistant
