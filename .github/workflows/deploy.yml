name: Deploy Personal AIssistant

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to run"
        required: true
        type: choice
        options:
          - deploy
          - get-credentials
          - all
        default: all

jobs:
  deploy-personal-aissistant:
    name: Deploy Personal AIssistant VS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::This workflow can only run on the main branch (current: ${GITHUB_REF_NAME})"
            exit 1
          fi
          echo "NETWORK=testnet" >> "$GITHUB_ENV"

      - name: Load configuration
        run: |
          set -a
          source config.env
          set +a
          while IFS= read -r line; do
            key="${line%%=*}"
            echo "${key}=${!key}" >> "$GITHUB_ENV"
          done < <(grep -E '^[A-Z_]+=' config.env)

      - name: Parse deployment.yaml
        run: |
          CHART_SOURCE=$(yq '.chartSource' deployment.yaml)
          CHART_VERSION=$(yq '.chartVersion' deployment.yaml)
          CHART_NAMESPACE="${{ secrets.K8S_NAMESPACE }}"
          RELEASE_NAME=$(yq '.nameOverride' deployment.yaml)
          echo "CHART_SOURCE=${CHART_SOURCE}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"
          echo "CHART_NAMESPACE=${CHART_NAMESPACE}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config <<'KUBEEOF'
          ${{ secrets.OVH_KUBECONFIG }}
          KUBEEOF

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'v1.29.9'

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0'

      # -----------------------------------------------------------------------
      # DEPLOY: Install/upgrade via Helm (hologram-generic-ai-agent-chart)
      # -----------------------------------------------------------------------
      - name: Create K8s secrets
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          NAMESPACE="${CHART_NAMESPACE}"

          # VS Agent DB secret
          VSAGENT_DB_PWD="${{ secrets.PERSONAL_AISSISTANT_VSAGENT_DB_PASSWORD }}"
          if [ -z "$VSAGENT_DB_PWD" ]; then
            VSAGENT_DB_PWD="$(openssl rand -hex 16)"
            echo "::warning::EXAMPLE_AGENT_VSAGENT_DB_PASSWORD secret not set — using generated password"
          fi
          kubectl create secret generic personal-aissistant-db-secret \
            --namespace "$NAMESPACE" \
            --from-literal=POSTGRES_PASSWORD="$VSAGENT_DB_PWD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create agent pack ConfigMap
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          kubectl create configmap personal-aissistant-agent-pack \
            --namespace "$CHART_NAMESPACE" \
            --from-file=agent-pack.yaml=agent-pack.yaml \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via Helm
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          # Strip chart metadata before passing to Helm
          yq 'del(.chartSource, .chartVersion)' deployment.yaml > /tmp/helm-values.yaml

          # Inject credential definition ID from config.env
          export CREDENTIAL_DEFINITION_ID
          yq -i '.credentialDefinitionId = env(CREDENTIAL_DEFINITION_ID)' /tmp/helm-values.yaml

          helm upgrade --install "$RELEASE_NAME" "$CHART_SOURCE" \
            --version "$CHART_VERSION" \
            --namespace "$CHART_NAMESPACE" \
            --values /tmp/helm-values.yaml \
            --set chatbot.secret.OPENAI_API_KEY="${{ secrets.PERSONAL_AISSISTANT_OPENAI_API_KEY }}" \
            --set chatbot.secret.MCP_CONFIG_ENCRYPTION_KEY="${{ secrets.PERSONAL_AISSISTANT_MCP_CONFIG_ENCRYPTION_KEY }}" \
            --set chatbot.secret.POSTGRES_PASSWORD="${{ secrets.PERSONAL_AISSISTANT_POSTGRES_PASSWORD }}" \
            --set postgres.secret.POSTGRES_PASSWORD="${{ secrets.PERSONAL_AISSISTANT_POSTGRES_PASSWORD }}" \
            --set vs-agent-chart.extraEnv[0].name=AGENT_WALLET_ID \
            --set vs-agent-chart.extraEnv[0].value="Personal AIssistant" \
            --set vs-agent-chart.extraEnv[1].name=AGENT_WALLET_KEY \
            --set vs-agent-chart.extraEnv[1].value="${{ secrets.PERSONAL_AISSISTANT_WALLET_KEY }}" \
            --wait --timeout 300s

      - name: Restart chatbot to pick up ConfigMap changes
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          kubectl rollout restart statefulset/personal-aissistant-chatbot -n "$CHART_NAMESPACE"
          kubectl rollout status statefulset/personal-aissistant-chatbot -n "$CHART_NAMESPACE" --timeout=120s

      # -----------------------------------------------------------------------
      # GET-CREDENTIALS: Obtain Service credential from eafit-challenge organization
      # Note: Organization port-forward removed per support team request
      # -----------------------------------------------------------------------
      - name: Skip organization credential step
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          echo "Skipping organization credential step - port-forward to organization service removed"
          echo "Service credential must be obtained manually or organization service deployed"

      # -----------------------------------------------------------------------
      # CLEANUP
      # -----------------------------------------------------------------------
      - name: Stop port-forwards
        if: always()
        run: |
          [ -n "${CHILD_PF_PID:-}" ] && kill "$CHILD_PF_PID" 2>/dev/null || true
          [ -n "${ORG_PF_PID:-}" ] && kill "$ORG_PF_PID" 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "## Personal AIssistant VS" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **VS Agent:** https://personal-aissistant.agents.team-f.teams.eafit.testnet.verana.network/.well-known/did.json" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Network:** testnet" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Chart:** ${CHART_SOURCE:-}:${CHART_VERSION:-}" >> "$GITHUB_STEP_SUMMARY"
